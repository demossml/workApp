#:schema node_modules/wrangler/config-schema.json
name = "work-app"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]
assets = { directory = "dist"}
upload_source_maps = true


routes = [
{ pattern = "demossml.cc", custom_domain = true }
]



[[d1_databases]]
binding = "DB" # доступно как env.DB
database_name = "work-db"
database_id = "0c434bad-9113-4689-9a49-becf4304330b"

migrations_dir = "./drizzle"



[ai]
binding = "AI"

[[r2_buckets]]
binding = "R2"
bucket_name = "evotor"
preview_bucket_name = "evotor"

# KV cache namespace (replace ids after creation)
[[kv_namespaces]]
binding = "KV"
id = "e63ab03b9ff0495cbd0f4e9d1875f2a0"
preview_id = "043bde4a321349bea43c2c223c6fec4f"

# Секретные переменные вынесены в .dev.vars (для разработки) и Cloudflare Secrets (для production)
# Для локальной разработки создайте файл .dev.vars в этой директории
# Для production используйте: wrangler secret put EVOTOR_API_TOKEN и wrangler secret put BOT_TOKEN

[vars]
# Только публичные переменные!
R2_PUBLIC_URL = "c1e9f63e6135bb4fa5600e83bf4a1a4b.r2.cloudflarestorage.com/evotor"
ALERT_TZ_OFFSET_MINUTES = "180"
ALERT_REFUND_THRESHOLD_PCT = "15"
ALERT_REVENUE_DROP_THRESHOLD_PCT = "20"
ALERT_THRESHOLD_PCT = "80"
AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"
AI_MAX_TOKENS = "1000"
ONEC_API_KEY = "секретный_ключ_минимум_32_символа"
WEATHER_DEFAULT_LAT = "54.7826"
WEATHER_DEFAULT_LON = "32.0453"
WEATHER_DEFAULT_NAME = "Smolensk"
DISABLE_AI_DIRECTOR = "false"

[triggers]
# Mixed schedule: каждые 3 минуты + в 08:00 и 11:00 UTC.
crons = ["*/3 * * * *", "0 8 * * *", "0 11 * * *"]
