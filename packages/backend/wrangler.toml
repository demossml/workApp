#:schema node_modules/wrangler/config-schema.json
name = "work-app"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]
assets = { directory = "dist"}
upload_source_maps = true


routes = [
  { pattern = "demossml.cc", custom_domain = true }
]


[[d1_databases]]
binding = "DB" # доступно как env.DB
database_name = "work-db"
database_id = "0c434bad-9113-4689-9a49-becf4304330b"

migrations_dir = "./drizzle"



[ai]
binding = "AI"

[[r2_buckets]]
binding = "R2"
bucket_name = "evotor"
preview_bucket_name = "evotor"





