name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck + Lint + Smoke
        run: pnpm ci:check

  api-smoke:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Require API smoke secrets on protected branches
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && (secrets.EVOTOR_API_TOKEN == '' || secrets.BOT_TOKEN == '') }}
        run: |
          echo "Missing required secrets EVOTOR_API_TOKEN/BOT_TOKEN for protected branch push."
          exit 1

      - name: API smoke skipped
        if: ${{ secrets.EVOTOR_API_TOKEN == '' || secrets.BOT_TOKEN == '' }}
        run: echo "API smoke skipped: EVOTOR_API_TOKEN/BOT_TOKEN secrets are not configured."

      - name: Run API smoke
        if: ${{ secrets.EVOTOR_API_TOKEN != '' && secrets.BOT_TOKEN != '' }}
        shell: bash
        env:
          EVOTOR_API_TOKEN: ${{ secrets.EVOTOR_API_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BACKEND_BASE_URL: http://127.0.0.1:8787
        run: |
          set -euo pipefail

          cat > packages/backend/.dev.vars <<EOF
          EVOTOR_API_TOKEN=${EVOTOR_API_TOKEN}
          BOT_TOKEN=${BOT_TOKEN}
          EOF

          cleanup() {
            kill "${BACKEND_PID:-0}" >/dev/null 2>&1 || true
            wait "${BACKEND_PID:-0}" >/dev/null 2>&1 || true
            rm -f packages/backend/.dev.vars
          }
          trap cleanup EXIT

          pnpm smoke:api:prepare

          pnpm -C packages/backend exec wrangler dev --ip 127.0.0.1 --port 8787 > /tmp/backend-smoke.log 2>&1 &
          BACKEND_PID=$!

          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:8787/" >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS "http://127.0.0.1:8787/" >/dev/null
          pnpm smoke:api

      - name: Upload backend smoke logs on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-smoke-log
          path: /tmp/backend-smoke.log
          if-no-files-found: ignore
